<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>My Profile - Hub Stay</title>
  <link rel="stylesheet" href="/client/css/style.css?v=1721160000">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand"><div class="logo-icon">H</div> Hub Stay</a>
      <div class="navbar-nav">
        <a href="/">Home</a>
        <a href="/client/pages/listings.html">Stays</a>
        <a href="/client/pages/cars.html">Cars</a>
      </div>
      <div class="navbar-actions">
        <button onclick="auth.logout()" class="btn btn-sm" style="background:var(--surface); border:1px solid var(--border); color:var(--text-secondary);">Logout</button>
      </div>
      <button class="nav-toggle">&#9776;</button>
    </div>
  </nav>

  <div class="container">
    <div class="profile-layout">
      <aside class="profile-sidebar">
        <img id="profile-avatar" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Profile">
        <h3 id="profile-name">Loading...</h3>
        <p id="profile-email"></p>
        <div class="profile-nav">
          <a href="#" class="active" onclick="showSection('bookings')">My Bookings</a>
          <a href="#" onclick="showSection('edit')">Edit Profile</a>
        </div>
      </aside>

      <main>
        <div id="bookings-section" class="profile-content">
          <h2>My Bookings</h2>
          <div id="bookings-list">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>

        <div id="edit-section" class="profile-content" style="display:none;">
          <h2>Edit Profile</h2>
          <form onsubmit="handleUpdateProfile(event)">
            <div class="form-row">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="edit-name">
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="edit-phone">
              </div>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="edit-email" disabled style="background: var(--bg); opacity: 0.7;">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="payment-modal">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('payment-modal').classList.remove('active')">&times;</button>
      <h2>Complete Payment</h2>
      <div id="payment-message" style="margin-bottom: 20px;"></div>
      <p>Click below to complete your payment for this booking.</p>
      <button class="btn btn-primary btn-block btn-lg" onclick="processPayment()" id="pay-btn">Pay with Stripe</button>
    </div>
  </div>

  <script src="/client/js/app.js?v=1721160000"></script>
  <script>
    if (!auth.isLoggedIn()) window.location.href = '/client/pages/auth.html';

    let pendingBookingId = null;

    document.addEventListener('DOMContentLoaded', () => {
      loadProfile();
      loadBookings();

      if (getQueryParam('payment') === 'success') {
        showToast('Payment successful!');
      }
    });

    async function loadProfile() {
      try {
        const user = await apiCall('/users/profile');
        document.getElementById('profile-name').textContent = user.name;
        document.getElementById('profile-email').textContent = user.email;
        document.getElementById('edit-name').value = user.name;
        document.getElementById('edit-phone').value = user.phone || '';
        document.getElementById('edit-email').value = user.email;
        if (user.avatar) document.getElementById('profile-avatar').src = user.avatar;
      } catch (err) {
        const localUser = auth.getUser();
        if (localUser) {
          document.getElementById('profile-name').textContent = localUser.name;
          document.getElementById('profile-email').textContent = localUser.email;
          document.getElementById('edit-name').value = localUser.name;
          document.getElementById('edit-email').value = localUser.email;
        }
      }
    }

    async function loadBookings() {
      try {
        const data = await apiCall('/bookings');
        const container = document.getElementById('bookings-list');

        if (data.bookings.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>No bookings yet</h3><p>Start exploring and make your first booking!</p><a href="/client/pages/listings.html" class="btn btn-primary" style="margin-top:16px;">Browse Stays</a></div>';
          return;
        }

        container.innerHTML = `
          <table class="booking-table">
            <thead>
              <tr>
                <th>Property</th>
                <th>Type</th>
                <th>Dates</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${data.bookings.map(b => `
                <tr>
                  <td><strong>${b.listingId?.name || 'N/A'}</strong></td>
                  <td style="text-transform:capitalize;">${b.listingType}</td>
                  <td>${formatDate(b.checkIn)}${b.checkOut ? ' - ' + formatDate(b.checkOut) : ''}</td>
                  <td><strong>${formatPrice(b.totalPrice)}</strong></td>
                  <td><span class="status-badge ${b.status}">${b.status}</span></td>
                  <td>
                    ${b.status === 'pending' && b.paymentStatus === 'unpaid' ? `<button class="btn btn-primary btn-sm" onclick="openPayment('${b._id}')">Pay Now</button>` : ''}
                    ${b.status === 'pending' ? `<button class="btn btn-sm" style="color:var(--danger); background:none; border:1px solid var(--danger);" onclick="cancelBooking('${b._id}')">Cancel</button>` : ''}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        document.getElementById('bookings-list').innerHTML = '<div class="empty-state"><h3>Could not load bookings</h3></div>';
      }
    }

    function openPayment(bookingId) {
      pendingBookingId = bookingId;
      document.getElementById('payment-modal').classList.add('active');
    }

    async function processPayment() {
      const btn = document.getElementById('pay-btn');
      const msg = document.getElementById('payment-message');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const data = await apiCall('/payments/create-checkout-session', {
          method: 'POST',
          body: JSON.stringify({ bookingId: pendingBookingId })
        });

        if (data.url) {
          window.location.href = data.url;
        } else {
          msg.innerHTML = '<div class="success-message">' + data.message + '</div>';
          setTimeout(() => {
            document.getElementById('payment-modal').classList.remove('active');
            loadBookings();
          }, 2000);
        }
      } catch (err) {
        msg.innerHTML = `<div class="error-message">${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Pay with Stripe';
      }
    }

    async function cancelBooking(id) {
      if (!confirm('Are you sure you want to cancel this booking?')) return;
      try {
        await apiCall(`/bookings/${id}/cancel`, { method: 'PUT' });
        showToast('Booking cancelled');
        loadBookings();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function handleUpdateProfile(e) {
      e.preventDefault();
      try {
        const updated = await apiCall('/users/profile', {
          method: 'PUT',
          body: JSON.stringify({
            name: document.getElementById('edit-name').value,
            phone: document.getElementById('edit-phone').value
          })
        });
        auth.setAuth(auth.getToken(), updated);
        document.getElementById('profile-name').textContent = updated.name;
        showToast('Profile updated!');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function showSection(section) {
      document.querySelectorAll('.profile-nav a').forEach(a => a.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('bookings-section').style.display = section === 'bookings' ? 'block' : 'none';
      document.getElementById('edit-section').style.display = section === 'edit' ? 'block' : 'none';
    }
  </script>
</body>
</html>
