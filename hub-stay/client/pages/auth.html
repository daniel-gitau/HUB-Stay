<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Login / Register - Hub Stay</title>
  <link rel="stylesheet" href="/client/css/style.css?v=1721160000">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <div class="logo-icon">H</div>
        Hub Stay
      </a>
      <div class="navbar-nav">
        <a href="/">Home</a>
        <a href="/client/pages/listings.html">Stays</a>
        <a href="/client/pages/cars.html">Cars</a>
      </div>
      <div class="navbar-actions">
        <a href="/client/pages/auth.html" class="btn btn-outline btn-sm">Log In</a>
        <a href="/client/pages/auth.html?tab=register" class="btn btn-primary btn-sm">Sign Up</a>
      </div>
      <button class="nav-toggle">&#9776;</button>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Log In</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Sign Up</button>
      </div>

      <div id="login-form">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to your Hub Stay account</p>

        <div id="login-error" class="error-message" style="display:none;"></div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Log In</button>
        </form>
      </div>

      <div id="register-form" style="display:none;">
        <h2>Create Account</h2>
        <p class="subtitle">Join Hub Stay and start exploring</p>

        <div id="register-error" class="error-message" style="display:none;"></div>

        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="reg-phone" placeholder="+1 234 567 890">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="reg-confirm" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="reg-btn">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/client/js/app.js?v=1721160000"></script>
  <script>
    if (auth.isLoggedIn()) window.location.href = '/client/pages/profile.html';

    const tab = getQueryParam('tab');
    if (tab === 'register') switchAuthTab('register');

    function switchAuthTab(type) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      if (type === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('register-form').style.display = 'none';
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errorEl.style.display = 'none';

      try {
        const data = await apiCall('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });
        auth.setAuth(data.token, data.user);
        window.location.href = '/client/pages/profile.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      const errorEl = document.getElementById('register-error');
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      errorEl.style.display = 'none';

      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      try {
        const data = await apiCall('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            phone: document.getElementById('reg-phone').value,
            password: password
          })
        });
        auth.setAuth(data.token, data.user);
        window.location.href = '/client/pages/profile.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
